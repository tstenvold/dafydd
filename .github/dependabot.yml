version: 2
updates:
  # Cargo dependencies
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
      include: scope

  # Python dependencies (pyproject.toml)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci):"
      include: scope
