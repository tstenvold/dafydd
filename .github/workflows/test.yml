name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run tests on Linux (primary platform)
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y socat

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-timeout pytest-cov

      - name: Build and install package
        run: pip install -e .

      - name: Run Linux-specific tests
        run: pytest tests/ -v -m "linux and not slow" --tb=short

      - name: Run all tests (non-slow)
        run: pytest tests/ -v -m "not slow" --tb=short -x

  # Run tests on macOS
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Homebrew dependencies
        run: brew install socat

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-timeout pytest-cov

      - name: Build and install package
        run: pip install -e .

      - name: Run macOS-specific tests
        run: pytest tests/ -v -m "macos and not slow" --tb=short

      - name: Run all tests (non-slow)
        run: pytest tests/ -v -m "not slow" --tb=short -x

  # Run tests on Windows
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-timeout pytest-cov

      - name: Build and install package
        run: pip install -e .

      - name: Run Windows-specific tests
        run: pytest tests/ -v -m "windows and not slow" --tb=short

      - name: Run all tests (non-slow)
        run: pytest tests/ -v -m "not slow" --tb=short -x

  # Optional: Run QEMU ARM tests (slow, only on main pushes)
  test-arm-qemu:
    name: Test (QEMU ARM)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install QEMU
        run: sudo apt-get install -y qemu-system-arm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-timeout

      - name: Build and install package
        run: pip install -e .

      - name: Run ARM tests
        run: pytest tests/ -v -m "arm and slow" --tb=short

  # Lint and type check
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install linting tools
        run: |
          pip install ruff black mypy

      - name: Run Python linter
        run: ruff check tests/

      - name: Run Python formatter check
        run: black --check tests/

      - name: Run Rust formatting
        run: cargo fmt --check

      - name: Run Rust clippy
        run: cargo clippy -- -D warnings